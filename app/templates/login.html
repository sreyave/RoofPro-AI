<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – RoofPro AI</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --slate-900:#0f172a;
      --slate-800:#1e2f47;
      --slate-700:#253a58;

      --amber:#e07c3a;
      --amber-hover:#c9692a;

      --white:#ffffff;
      --text:#1a2332;
      --muted:#94a3b8;

      --border:rgba(255,255,255,0.08);

      --font-brand:'Playfair Display', serif;
      --font-body:'DM Sans', sans-serif;

      --shadow:0 20px 60px rgba(0,0,0,0.35);
    }

    * {
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body {
      font-family:var(--font-body);
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;

      background: radial-gradient(circle at top, #1e2f47, #0f172a);
      overflow:hidden;
    }

    /* 🌫 Background glow */
    body::before {
      content:"";
      position:absolute;
      width:600px;
      height:300px;
      background: radial-gradient(ellipse, rgba(224,124,58,0.25), transparent 70%);
      top:10%;
      left:50%;
      transform:translateX(-50%);
      pointer-events:none;
    }

    /* 🔷 NAVBAR */
    .navbar {
      position:fixed;
      top:0;
      left:0;
      width:100%;
      padding:14px 30px;
      display:flex;
      justify-content:space-between;
      align-items:center;

      background:rgba(15, 23, 42, 0.6);
      backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
      z-index:1000;
    }

    .logo {
      font-family:var(--font-brand);
      font-size:1.2rem;
      color:#fff;
    }

    .logo span {
      color:var(--amber);
    }

    .nav-links {
      display:flex;
      gap:14px;
    }

    .nav-links a {
      color:rgba(255,255,255,0.7);
      text-decoration:none;
      font-size:0.85rem;
      padding:6px 12px;
      border-radius:8px;
      transition:0.2s;
    }

    .nav-links a:hover {
      background:rgba(255,255,255,0.08);
      color:#fff;
    }

    .nav-links a.active {
      background:var(--amber);
      color:#fff;
    }

    /* 🧾 LOGIN CARD */
    .card {
      width:100%;
      max-width:420px;
      background:rgba(255,255,255,0.06);
      border:1px solid var(--border);
      backdrop-filter:blur(18px);
      border-radius:18px;
      padding:40px 32px;
      box-shadow:var(--shadow);
      position:relative;
      z-index:2;
      animation:fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity:0; transform:translateY(10px); }
      to { opacity:1; transform:translateY(0); }
    }

    .title {
      font-family:var(--font-brand);
      font-size:1.8rem;
      text-align:center;
      color:#fff;
      margin-bottom:6px;
    }

    .title span {
      color:var(--amber);
    }

    .subtitle {
      text-align:center;
      color:var(--muted);
      font-size:0.9rem;
      margin-bottom:25px;
    }

    /* FORM */
    .input-group {
      margin-bottom:15px;
    }

    label {
      display:block;
      font-size:0.8rem;
      color:rgba(255,255,255,0.7);
      margin-bottom:6px;
    }

    input {
      width:100%;
      padding:12px 14px;
      border-radius:10px;
      border:1px solid var(--border);
      background:rgba(255,255,255,0.05);
      color:#fff;
      outline:none;
      transition:0.2s;
    }

    input:focus {
      border-color:var(--amber);
      box-shadow:0 0 0 3px rgba(224,124,58,0.2);
    }

    /* OPTIONS */
    .options {
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:0.8rem;
      color:rgba(255,255,255,0.6);
      margin:10px 0 18px;
    }

    .options label {
      display:flex;
      align-items:center;
      gap:6px;
      cursor:pointer;
    }

    .btn {
      width:100%;
      background:var(--amber);
      border:none;
      padding:12px;
      border-radius:10px;
      color:#fff;
      font-weight:600;
      cursor:pointer;
      transition:0.2s;
    }

    .btn:hover {
      background:var(--amber-hover);
      transform:translateY(-1px);
    }

    .error {
      display:none;
      background:rgba(255,0,0,0.1);
      color:#ff6b6b;
      padding:10px;
      border-radius:8px;
      font-size:0.85rem;
      margin-bottom:12px;
    }

  </style>
</head>

<body>

  <!-- 🔷 NAVBAR -->
  <div class="navbar">

    <div class="logo">RoofPro <span>AI</span></div>

    <div class="nav-links">
      
      <a href="/" class="active">Home</a>
    </div>

  </div>

  <!-- 🧾 LOGIN CARD -->
  <div class="card">

    <div class="title">Admin <span>Login</span></div>
    <div class="subtitle">Secure access to RoofPro dashboard</div>

    <div class="error" id="errorBox">Invalid username or password</div>

    <form method="POST">

      <div class="input-group">
        <label>Username</label>
        <input type="text" name="username" required>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" name="password" required>
      </div>

      <div class="options">
        <label>
          <input type="checkbox">
          Remember me
        </label>
        <a href="#" style="color:var(--amber); text-decoration:none;">Forgot?</a>
      </div>

      <button class="btn" type="submit">Login</button>

    </form>

  </div>

</body>
</html>
